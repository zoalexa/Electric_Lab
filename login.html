<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f4f7fb; }
.box { background:white; padding:30px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); width:300px; }
input { width:100%; padding:10px; margin:10px 0; }
button { width:100%; padding:10px; margin-top:5px; }
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="continueAsGuest()">View as Guest</button>

</div>

<script src="auth.js"></script>
</body>
</html>
